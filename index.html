<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Agentoro Fix</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        .fb-btn { background-color: #1877f2; color: white; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <h1>Agentoro AI</h1>
    <p>اضغط للربط وتصوير الفيديو</p>
    
    <a id="final-link" href="#" class="fb-btn">Continue with Facebook</a>
</div>

<script>
    // الإعدادات المسجلة في حسابك
    const appId = "4436833363269286";
    const configId = "958603016868973";
    
    // تأكد أن هذا الرابط مضاف في Valid OAuth Redirect URIs في لوحة تحكم فيسبوك
    const redirectUri = "https://wa.agentoro.shop/auth/callback";

    const scope = "whatsapp_business_management,whatsapp_business_messaging";
    
    const extras = JSON.stringify({
        feature: "whatsapp_embedded_signup",
        config_id: configId
    });

    // بناء الرابط بصيغة تمنع خطأ "URL Blocked"
    const url = `https://www.facebook.com/v25.0/dialog/oauth?client_id=${appId}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${scope}&response_type=code&extras=${encodeURIComponent(extras)}`;

    document.getElementById('final-link').href = url;
</script>

</body>
</html>
